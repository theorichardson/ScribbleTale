name: ScribbleTale
options:
  bundleIdPrefix: com.scribbletale
  deploymentTarget:
    iOS: "18.4"
  xcodeVersion: "16.2"
  developmentLanguage: en

packages:
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: "2.31.3"
  ml-stable-diffusion:
    url: https://github.com/apple/ml-stable-diffusion
    from: "1.1.1"

targets:
  ScribbleTale:
    type: application
    platform: iOS
    sources:
      - path: ScribbleTale
        excludes:
          - "Preview Content"
      - path: ScribbleTale/Preview Content
        buildPhase: none
    settings:
      base:
        DEVELOPMENT_TEAM: YW3FCY33TJ
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        SWIFT_VERSION: "6.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.scribbletale.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 5
        DEVELOPMENT_ASSET_PATHS: "\"ScribbleTale/Preview Content\""
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_FILE: ScribbleTale/Info.plist
        # Standard HTTPS only; simplifies App Store Connect export-compliance questions
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        SWIFT_EMIT_LOC_STRINGS: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: ml-stable-diffusion
        product: StableDiffusion
    entitlements:
      path: ScribbleTale/ScribbleTale.entitlements
      properties: {}

schemes:
  ScribbleTale:
    build:
      targets:
        ScribbleTale: all
    run:
      config: Debug
    archive:
      config: Release
    test:
      config: Debug
